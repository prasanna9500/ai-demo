name: AI Infrastructure Deployment

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Infrastructure Request"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      USER_PROMPT: ${{ github.event.inputs.prompt }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Terraform
        run: python scripts/generate_tf.py

      - name: Show Generated Terraform
        run: |
          echo "===== main.tf ====="
          cat terraform/main.tf
          echo ""
          echo "===== action.txt ====="
          cat terraform/action.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify AWS Credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: aws sts get-caller-identity

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform init

      - name: Read AI Action
        id: ai_action
        run: |
          echo "action=$(cat terraform/action.txt)" >> $GITHUB_OUTPUT

      - name: Show AI Decision
        run: |
          echo "AI selected action: ${{ steps.ai_action.outputs.action }}"

      - name: Terraform Validate
        if: ${{ steps.ai_action.outputs.action == 'apply' }}
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        if: ${{ steps.ai_action.outputs.action == 'apply' }}
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ steps.ai_action.outputs.action == 'destroy' }}
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: terraform destroy -auto-approve
