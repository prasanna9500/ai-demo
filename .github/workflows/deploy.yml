name: AWS CLI Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      request:
        description: Enter request
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute AWS CLI Commands
        env:
          USER_REQUEST: ${{ github.event.inputs.request }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          echo "User Request: $USER_REQUEST"

          ########################################
          # ✅ EXTRACT NAME (SMART)
          ########################################
          NAME=$(echo "$USER_REQUEST" | grep -oE "name [a-zA-Z0-9\-]+" | awk '{print $2}')

          if [ -z "$NAME" ]; then
            NAME=$(echo "$USER_REQUEST" | awk '{print $NF}')
          fi

          echo "Resolved Name: $NAME"

          ########################################
          # ✅ KEYWORD DETECTION
          ########################################
          CREATE=$(echo "$USER_REQUEST" | grep -qiE "create|need|provision" && echo true)
          DELETE=$(echo "$USER_REQUEST" | grep -qiE "delete|destroy|remove|terminate" && echo true)

          ########################################
          # ✅ CREATE EC2
          ########################################
          if echo "$USER_REQUEST" | grep -qi "ec2" && [ "$CREATE" = true ]; then

            [ -z "$NAME" ] && NAME="ec2-$(date +%s)"

            echo "Creating EC2: $NAME"

            AMI=$(aws ec2 describe-images \
              --owners 099720109477 \
              --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
                        "Name=state,Values=available" \
              --query "Images | sort_by(@,&CreationDate)[-1].ImageId" \
              --output text)

            aws ec2 run-instances \
              --image-id "$AMI" \
              --instance-type t3.micro \
              --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=$NAME}]"

            echo "✅ EC2 created"
          fi

          ########################################
          # ✅ CREATE S3
          ########################################
          if echo "$USER_REQUEST" | grep -qi "s3" && [ "$CREATE" = true ]; then

            [ -z "$NAME" ] && NAME="bucket-$(date +%s)"

            echo "Creating S3: $NAME"

            aws s3 mb s3://$NAME

            echo "✅ S3 created"
          fi

          ########################################
          # ✅ CREATE LAMBDA
          ########################################
          if echo "$USER_REQUEST" | grep -qi "lambda" && [ "$CREATE" = true ]; then

            [ -z "$NAME" ] && NAME="lambda-$(date +%s)"

            echo "Creating Lambda: $NAME"

            # Create simple lambda zip
            echo 'def lambda_handler(event, context): return "Hello from Lambda"' > lambda.py
            zip function.zip lambda.py

            aws lambda create-function \
              --function-name "$NAME" \
              --runtime python3.11 \
              --role arn:aws:iam::195731802338:role/lambda-basic-role \
              --handler lambda.lambda_handler \
              --zip-file fileb://function.zip

            echo "✅ Lambda created"
          fi

          ########################################
          # ✅ DELETE EC2
          ########################################
          if echo "$USER_REQUEST" | grep -qi "ec2" && [ "$DELETE" = true ]; then

            if [ -z "$NAME" ]; then
              echo "❌ Name required for EC2 delete"
              exit 1
            fi

            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=$NAME" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text)

            if [ -z "$INSTANCE_ID" ]; then
              echo "No EC2 found"
              exit 1
            fi

            aws ec2 terminate-instances --instance-ids $INSTANCE_ID

            echo "✅ EC2 deleted"
          fi

          ########################################
          # ✅ DELETE S3
          ########################################
          if echo "$USER_REQUEST" | grep -qi "s3" && [ "$DELETE" = true ]; then

            if [ -z "$NAME" ]; then
              echo "❌ Name required for S3 delete"
              exit 1
            fi

            aws s3 rb s3://$NAME --force

            echo "✅ S3 deleted"
          fi

          ########################################
          # ✅ DELETE LAMBDA
          ########################################
          if echo "$USER_REQUEST" | grep -qi "lambda" && [ "$DELETE" = true ]; then

            if [ -z "$NAME" ]; then
              echo "❌ Name required for Lambda delete"
              exit 1
            fi

            aws lambda delete-function --function-name "$NAME"

            echo "✅ Lambda deleted"
          fi

          echo "✅ Done"
