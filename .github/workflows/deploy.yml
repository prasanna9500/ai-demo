name: AWS CLI Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      request:
        description: Enter request
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute AWS CLI Commands
        env:
          USER_REQUEST: ${{ github.event.inputs.request }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          set -e
          set -x

          echo "User Request: $USER_REQUEST"

          ########################################
          # ✅ EXTRACT NAME
          ########################################
          NAME=$(echo "$USER_REQUEST" | grep -oE "name [a-zA-Z0-9\-]+" | awk '{print $2}') || true

          if [ -z "$NAME" ]; then
            NAME=$(echo "$USER_REQUEST" | awk '{print $NF}')
          fi

          echo "Resolved Name: $NAME"

          ########################################
          # ✅ KEYWORD DETECTION
          ########################################
          CREATE=false
          DELETE=false

          echo "$USER_REQUEST" | grep -qiE "create|need|provision" && CREATE=true || true
          echo "$USER_REQUEST" | grep -qiE "delete|destroy|remove|terminate" && DELETE=true || true

          ########################################
          # ✅ CREATE EC2
          ########################################
          if echo "$USER_REQUEST" | grep -qi "ec2" && [ "$CREATE" = true ]; then

            [ -z "$NAME" ] && NAME="ec2-$(date +%s)"

            echo "Creating EC2: $NAME"

            AMI=$(aws ec2 describe-images \
              --owners 099720109477 \
              --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
                        "Name=state,Values=available" \
              --query 'Images | sort_by(@,&CreationDate)[-1].ImageId' \
              --output text)

            echo "Using AMI: $AMI"

            aws ec2 run-instances \
              --image-id "$AMI" \
              --instance-type "t3.micro" \
              --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=$NAME}]"

            echo "✅ EC2 created"
          fi

          ########################################
          # ✅ CREATE S3
          ########################################
          if echo "$USER_REQUEST" | grep -qi "s3" && [ "$CREATE" = true ]; then

            [ -z "$NAME" ] && NAME="bucket-$(date +%s)"

            echo "Creating S3: $NAME"

            aws s3 mb "s3://$NAME"

            echo "✅ S3 created"
          fi

          ########################################
          # ✅ DELETE EC2
          ########################################
          if echo "$USER_REQUEST" | grep -qi "ec2" && [ "$DELETE" = true ]; then

            echo "Finding EC2 with name: $NAME"

            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=$NAME" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text)

            if [ -z "$INSTANCE_ID" ]; then
              echo "No EC2 found"
            else
              aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
              echo "✅ EC2 deleted"
            fi
          fi

          ########################################
          # ✅ DELETE S3
          ########################################
          if echo "$USER_REQUEST" | grep -qi "s3" && [ "$DELETE" = true ]; then

            echo "Deleting S3: $NAME"

            aws s3 rb "s3://$NAME" --force

            echo "✅ S3 deleted"
          fi

          echo "✅ Done"
