name: AWS CLI Infra Pipeline

on:
  workflow_dispatch:
    inputs:
      request:
        description: Enter request
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute AWS CLI Commands
        env:
          USER_REQUEST: ${{ github.event.inputs.request }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          echo "User Request: $USER_REQUEST"

          # ✅ Extract name
          NAME=$(echo "$USER_REQUEST" | grep -oE "name [a-zA-Z0-9\-]+" | awk '{print $2}')
          echo "Resolved Name: $NAME"

          ########################################
          # ✅ CREATE EC2
          ########################################
          if echo "$USER_REQUEST" | grep -qi "create ec2"; then
            [ -z "$NAME" ] && NAME="ec2-$(date +%s)"

            echo "Creating EC2: $NAME"

            AMI=$(aws ec2 describe-images \
              --owners 099720109477 \
              --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
                        "Name=state,Values=available" \
              --query "Images | sort_by(@,&CreationDate)[-1].ImageId" \
              --output text)

            aws ec2 run-instances \
              --image-id "$AMI" \
              --instance-type t3.micro \
              --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=$NAME}]"

            echo "✅ EC2 created"
          fi

          ########################################
          # ✅ CREATE S3
          ########################################
          if echo "$USER_REQUEST" | grep -qi "create s3"; then
            [ -z "$NAME" ] && NAME="bucket-$(date +%s)"

            echo "Creating S3: $NAME"

            aws s3 mb s3://$NAME

            echo "✅ S3 created"
          fi

          ########################################
          # ✅ DESTROY EC2 (BY NAME)
          ########################################
          if echo "$USER_REQUEST" | grep -qi "destroy ec2"; then
            if [ -z "$NAME" ]; then
              echo "❌ Name required to delete EC2"
              exit 1
            fi

            echo "Finding EC2 with name: $NAME"

            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=$NAME" \
              --query "Reservations[].Instances[].InstanceId" \
              --output text)

            if [ -z "$INSTANCE_ID" ]; then
              echo "No EC2 found"
              exit 1
            fi

            echo "Terminating EC2: $INSTANCE_ID"

            aws ec2 terminate-instances --instance-ids $INSTANCE_ID

            echo "✅ EC2 deleted"
          fi

          ########################################
          # ✅ DESTROY S3 (BY NAME)
          ########################################
          if echo "$USER_REQUEST" | grep -qi "destroy s3"; then
            if [ -z "$NAME" ]; then
              echo "❌ Name required to delete S3"
              exit 1
            fi

            echo "Deleting S3: $NAME"

            aws s3 rb s3://$NAME --force

            echo "✅ S3 deleted"
          fi

          echo "✅ Done"
