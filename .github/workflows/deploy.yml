name: AI Infrastructure Deployment

on:
workflow_dispatch:
inputs:
prompt:
description: "Infrastructure request"
required: true
type: string

jobs:
deploy:
runs-on: ubuntu-latest

```
env:
  USER_PROMPT: ${{ github.event.inputs.prompt }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Python Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install google-genai

  - name: Generate Terraform Using Gemini
    run: |
      python scripts/generate_tf.py

  - name: Display Generated Terraform
    run: |
      echo "========== GENERATED TERRAFORM =========="
      cat terraform/main.tf
      echo "========================================="

  - name: Setup Terraform
    uses: hashicorp/setup-terraform@v3

  - name: Terraform Format Check
    working-directory: terraform
    run: terraform fmt

  - name: Terraform Init
    working-directory: terraform
    run: terraform init

  - name: Terraform Validate
    working-directory: terraform
    run: terraform validate

  - name: Terraform Apply
    working-directory: terraform
    run: terraform apply -auto-approve
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
```
